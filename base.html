<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}TasteStream{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&family=Cormorant+Garamond:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
  <div class="ambient ambient-left"></div>
  <div class="ambient ambient-right"></div>

  <div class="page-shell">
    <header class="top-header">
      <div class="brand-lockup">
        <span class="brand-mark">TS</span>
        <div>
          <p class="eyebrow">Recipe and video journal</p>
          <h1>TasteStream</h1>
        </div>
      </div>

      <nav class="nav-pills">
        <a class="nav-link {% if request.endpoint == 'home' %}is-current{% endif %}" href="{{ url_for('home') }}">Начало</a>
        <a class="nav-link {% if request.endpoint == 'recipes' %}is-current{% endif %}" href="{{ url_for('recipes') }}">Рецепты</a>
        <a class="nav-link {% if request.endpoint == 'videos' %}is-current{% endif %}" href="{{ url_for('videos') }}">Видео</a>
        <a class="nav-link {% if request.endpoint == 'author' %}is-current{% endif %}" href="{{ url_for('author') }}">Автор</a>
      </nav>
    </header>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        <section class="flash-stack">
          {% for category, message in messages %}
            <article class="flash flash-{{ category }}">{{ message }}</article>
          {% endfor %}
        </section>
      {% endif %}
    {% endwith %}

    {% block content %}{% endblock %}
  </div>

  <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
